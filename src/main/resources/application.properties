spring.application.name=API_joueur

# --- MongoDB Configuration ---
# URI par défaut pour le local (port 27018 mappé)
# Sera écrasé par la variable d'env dans Docker
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27018/gatcha-player-db}
spring.data.mongodb.auto-index-creation=true

# --- Actuator (Health Checks) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# --- External APIs ---
# URL de l'API Auth (host.docker.internal pour Docker Desktop / Localhost)
gatcha.auth-api.url=${AUTH_API_URL:http://host.docker.internal:8080/user/verify-token}