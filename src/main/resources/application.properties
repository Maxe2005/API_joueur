spring.application.name=API_joueur

spring.data.mongodb.host=${SPRING_DATA_MONGODB_HOST:localhost}
spring.data.mongodb.port=${SPRING_DATA_MONGODB_PORT:27018}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:gatcha-player-db}

spring.data.mongodb.auto-index-creation=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

