spring.application.name=API_joueur

# --- MongoDB Configuration ---
spring.data.mongodb.host=${SPRING_DATA_MONGODB_HOST:localhost}
spring.data.mongodb.port=${SPRING_DATA_MONGODB_PORT:27018}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:gatcha-player-db}
spring.data.mongodb.auto-index-creation=true

# --- Actuator (Health Checks) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# --- External APIs ---
gatcha.auth-api.host=${AUTH_API_HOST:http://host.docker.internal}
gatcha.auth-api.port=${AUTH_API_PORT:8080}