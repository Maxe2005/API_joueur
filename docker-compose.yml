version: '3.8'

services:
  mongo-player:
    image: mongo:latest
    container_name: mongo-player
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_DATABASE=gatcha-player-db
    volumes:
      - ./mongo-init:/docker-entrypoint-initdb.d
      - mongodb_player_data:/data/db

  api-joueur:
    build: .
    container_name: api-joueur
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo-player:27017/gatcha-player-db
    depends_on:
      - mongo-player

volumes:
  mongodb_player_data: